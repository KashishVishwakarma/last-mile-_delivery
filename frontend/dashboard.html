<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

body{

background:#eef2f5;

}

.dashboard{

width:90%;
margin:auto;
margin-top:40px;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);

}

table{

width:100%;
border-collapse:collapse;

}

table th,table td{

padding:15px;
border-bottom:1px solid #ddd;

}

button{

width:auto;
padding:10px 20px;

}

</style>

</head>

<body>

<div class="dashboard">

<div class="header">

<h1>Delivery Dashboard</h1>

<button>Logout</button>

</div>

<div class="card">

<h2>Recent Deliveries</h2>

<br>

<table>

<tr>

<th>Order ID</th>

<th>Customer</th>

<th>Status</th>

<th>Agent</th>

</tr>

<tr>

<td>#1001</td>

<td>Rahul</td>

<td>Delivered</td>

<td>Rohit</td>

</tr>

<tr>

<td>#1002</td>

<td>Amit</td>

<td>Out For Delivery</td>

<td>Akash</td>

</tr>

<tr>

<td>#1003</td>

<td>Priya</td>

<td>Pending</td>

<td>Not Assigned</td>

</tr>

</table>

</div>

</div>

</body>

</html>
