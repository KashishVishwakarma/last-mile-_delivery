<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Mile Delivery Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f4f4f4;
        }

        .container{
            width:420px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#1da1ff;
            font-size:42px;
            font-weight:bold;
            margin-bottom:35px;
            line-height:1.2;
        }

        .input-box{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:18px;
            outline:none;
        }

        .input-box:focus{
            border-color:#1da1ff;
        }

        .login-btn{
            width:100%;
            padding:15px;
            background:#19a8ff;
            color:white;
            border:none;
            border-radius:10px;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#0b95ea;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Last Mile Delivery<br>Tracker</h1>

    <form>
        <input type="email" class="input-box" placeholder="Enter Email" required>

        <input type="password" class="input-box" placeholder="Enter Password" required>

        <button type="submit" class="login-btn">Login</button>
    </form>
</div>

</body>
</html>
